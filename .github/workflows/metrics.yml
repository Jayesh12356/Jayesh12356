name: Generate Profile Metrics

# Note: This workflow uses lowlighter/metrics. For best results, create a
# Personal Access Token with `public_repo`, `read:user`, `read:org`, and
# `read:packages` scopes and store it as the repo secret `METRICS_TOKEN`.
# Without `METRICS_TOKEN`, the action falls back to the default GITHUB_TOKEN
# which works for public-only metrics with reduced detail.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Jayesh12356
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_padding: 0, 8 + 11%

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_lines: yes
          plugin_lines_history_limit: 1

          # Note: plugin_languages, plugin_topics, and plugin_achievements were
          # removed — on the fallback GITHUB_TOKEN they render empty ("0
          # Languages") or error ("Unexpected error"). Add a METRICS_TOKEN PAT
          # (read:user, public_repo, read:org) and re-enable them for richer data.

          # Dark brand theming (slate/indigo/purple) so the committed SVG
          # matches the profile without relying on any external theme service.
          # `[fill="#ebedf0"]` recolors the empty contribution cells (both the
          # 2D <rect> calendar and the 3D <path> isocalendar) without touching
          # the green contribution cells.
          extras_css: >
            svg{background:#0F172A;color:#E2E8F0}
            h1,h2,h3{color:#8B5CF6}
            .field svg{fill:#94A3B8}
            .field.error,.field.error svg{fill:#F87171}
            footer{color:#64748B}
            a{color:#06B6D4}
            [fill="#ebedf0"]{fill:#1E293B}
            .calendar .day{outline-color:rgba(148,163,184,.10)}
