name: Generate Profile Metrics

# Note: This workflow uses lowlighter/metrics. For best results, create a
# Personal Access Token with `public_repo`, `read:user`, `read:org`, and
# `read:packages` scopes and store it as the repo secret `METRICS_TOKEN`.
# Without `METRICS_TOKEN`, the action falls back to the default GITHUB_TOKEN
# which works for public-only metrics with reduced detail.

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Jayesh12356
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_padding: 0, 8 + 11%

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, makefile, dockerfile, shell
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8

          plugin_topics: yes
          plugin_topics_mode: starred
          plugin_topics_limit: 15

          plugin_lines: yes
          plugin_lines_history_limit: 1

          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
